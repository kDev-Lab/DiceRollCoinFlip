<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Dice and Coin Master d20 icon</title>
  <desc id="desc">A glossy purple twenty-sided die with cyan numbers.</desc>
  <defs>
    <linearGradient id="body" x1="74" y1="68" x2="430" y2="444" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f752ff"/>
      <stop offset="0.38" stop-color="#9b18d9"/>
      <stop offset="0.72" stop-color="#7410b8"/>
      <stop offset="1" stop-color="#351169"/>
    </linearGradient>
    <linearGradient id="faceLight" x1="137" y1="138" x2="354" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff8ff" stop-opacity="0.96"/>
      <stop offset="0.52" stop-color="#ead4ff" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#af82f6" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="facePurple" x1="48" y1="164" x2="458" y2="354" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d22eff" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="#8e16d2" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#48106f" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#170624" flood-opacity="0.4"/>
    </filter>
    <filter id="numberShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#1a0651" flood-opacity="0.72"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="#fbf7ff"/>
  <g filter="url(#shadow)">
    <polygon points="251,32 441,138 486,315 360,458 153,452 31,302 79,121" fill="url(#body)"/>
    <polygon points="251,32 270,155 441,138" fill="#d958ff" opacity="0.58"/>
    <polygon points="79,121 270,155 31,302" fill="#a915da" opacity="0.9"/>
    <polygon points="270,155 486,315 441,138" fill="#66109f" opacity="0.88"/>
    <polygon points="31,302 270,155 153,452" fill="#c21df2" opacity="0.66"/>
    <polygon points="270,155 360,458 153,452" fill="#7b14c2" opacity="0.9"/>
    <polygon points="270,155 486,315 360,458" fill="#4a0d7f" opacity="0.9"/>
    <polygon points="143,162 331,113 370,293 198,386" fill="url(#faceLight)" stroke="#451077" stroke-width="8"/>
    <polygon points="79,121 143,162 198,386 31,302" fill="url(#facePurple)" stroke="#5c0f8f" stroke-width="5" opacity="0.8"/>
    <polygon points="331,113 441,138 486,315 370,293" fill="url(#facePurple)" stroke="#4f0e82" stroke-width="5" opacity="0.86"/>
    <polygon points="198,386 370,293 360,458" fill="#6e13af" stroke="#4b0c80" stroke-width="5" opacity="0.9"/>
    <path d="M162 173 L331 130 L350 284 L204 363 Z" fill="#ffffff" opacity="0.18"/>
    <path d="M102 138 L253 61 L410 151" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" opacity="0.16"/>
  </g>

  <g filter="url(#numberShadow)" font-family="Outfit, Arial, sans-serif" font-weight="900" fill="#22c5ff" stroke="#114da5" stroke-width="8" paint-order="stroke">
    <text x="206" y="284" font-size="102" transform="rotate(-13 250 245)">8</text>
    <text x="267" y="140" font-size="82" transform="rotate(12 306 104)">20</text>
    <text x="79" y="265" font-size="72" transform="rotate(-74 104 236)">10</text>
    <text x="374" y="289" font-size="68" transform="rotate(78 402 260)">4</text>
  </g>
</svg>
